version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: smartprep-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: smartprep-ai
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - smartprep-network

  # Backend Server
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smartprep-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://admin:password@mongo:27017/smartprep-ai?authSource=admin
      - JWT_SECRET=your_production_jwt_secret_change_this
      - CLIENT_URL=https://your-domain.com
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    networks:
      - smartprep-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (Production Build)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: smartprep-frontend
    restart: unless-stopped
    environment:
      - VITE_API_URL=https://your-domain.com/api
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - smartprep-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  smartprep-network:
    driver: bridge

volumes:
  mongo-data: